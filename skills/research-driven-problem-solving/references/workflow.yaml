name: ARPS
full_name: Adaptive Reasoning and Problem Solving
version: 0.7.0
summary: >
  A human-like reasoning workflow for non-physical problems that combines
  capability awareness, reframing, causal modeling, option generation,
  trade-off evaluation, and bounded next actions with both hard and soft
  validation, explicit confidence tracking, and long-run autonomy controls.

default_mode: auto

modes:
  - auto
  - research
  - decision
  - planning
  - diagnosis
  - communication
  - hybrid

problem_kinds:
  - truth
  - preference
  - coordination
  - explanation
  - sequencing

stages:
  - id: inventory
    name: capability_inventory
    description: >
      Enumerate what the agent can actually do before planning.
      Constrains all downstream work items to feasible actions.
    outputs:
      - can_run_code
      - can_search_web
      - can_read_files
      - can_write_files
      - can_call_apis
      - can_ask_human
      - available_tools
      - hard_limits

  - id: orient
    name: orientation
    description: Classify the task and identify the dominant problem kind.
    outputs:
      - task_type
      - dominant_problem_kind
      - initial_scope

  - id: reframe
    name: problem_reframing
    description: Rewrite the problem in a more concrete and decision-useful way.
    outputs:
      - problem_restatement
      - desired_outcome
      - decision_owner
      - stakeholders
      - constraints
      - risks

  - id: model
    name: situation_modeling
    description: Separate facts from assumptions and build a light causal model.
    outputs:
      - known_facts
      - working_assumptions
      - causal_hypotheses
      - dominant_uncertainties
      - time_horizon
      - reversibility

  - id: review
    name: prior_case_review
    description: Review prior work, analogous cases, and reusable patterns.
    outputs:
      - reusable_ideas
      - analogous_cases
      - known_failure_patterns

  - id: options
    name: option_generation
    description: Generate materially different options before committing.
    outputs:
      - candidate_options
      - least_effort_option
      - safest_reversible_option
      - highest_upside_option

  - id: evaluate
    name: tradeoff_evaluation
    description: Compare options using the most relevant decision lenses.
    outputs:
      - comparison_table
      - preferred_option
      - reasons_for_rejection
      - residual_uncertainty

  - id: act
    name: bounded_next_action
    description: Choose one concrete next action and define what would change the recommendation.
    outputs:
      - next_action
      - evidence_to_collect
      - mind_change_triggers
      - guardrails

  - id: reflect
    name: reflection
    description: Update lessons after validation, execution, or scenario testing.
    outputs:
      - observed_evidence
      - lessons
      - revised_confidence
      - failure_type

  - id: synthesize
    name: synthesis
    description: Summarize the recommendation, rejected options, uncertainty, and next step.
    outputs:
      - final_status
      - final_recommendation
      - rejected_options
      - reusable_lessons

stage_transitions:
  inventory_to_orient:
    condition: capability list is complete
    checkpoint: true
  orient_to_reframe:
    condition: task type and problem kind identified
    checkpoint: true
    note: always proceed to reframe, never skip
  reframe_to_model:
    condition: problem framing is stable
    checkpoint: true
    fallback: if reframing reveals a fundamentally different problem, return to orient
  model_to_review:
    condition: facts and assumptions are separated, causal hypotheses exist
    checkpoint: true
    fallback: if separation is impossible, stay in model
  review_to_options:
    condition: at least one reusable pattern identified, or confirmed no prior work exists
    checkpoint: true
  options_to_evaluate:
    condition: at least 2 materially different options exist
    checkpoint: true
    fallback: if only 1 option, stay in options and generate more
  evaluate_to_act:
    condition: one option is preferred, or remaining options cannot be separated without new evidence
    checkpoint: true
  act_to_reflect:
    condition: bounded action taken or deliverable produced
    checkpoint: true
  reflect_to_any:
    condition: based on failure diagnosis, route per failure_routing
    checkpoint: true
    note: backward transitions are normal, not failure

task_routing:
  auto:
    rules:
      - if_primary_need_is_comparing_options_under_uncertainty: decision
      - if_primary_need_is_designing_sequence_or_rollout: planning
      - if_primary_need_is_explaining_why_something_is_failing: diagnosis
      - if_primary_need_is_shaping_a_message_or_memo: communication
      - if_problem_spans_multiple_modes_or_has_partial_validation: hybrid
      - else: research

validation_modes:
  - executable
  - factual
  - comparative
  - rubric
  - scenario
  - stakeholder
  - consistency

failure_taxonomy:
  - framing_failure
  - evidence_failure
  - causal_failure
  - option_failure
  - tradeoff_failure
  - stakeholder_failure
  - communication_failure
  - constraint_failure
  - execution_failure
  - scope_failure

failure_routing:
  framing_failure: reframe
  evidence_failure: model
  causal_failure: model
  option_failure: options
  tradeoff_failure: evaluate
  stakeholder_failure: reframe
  communication_failure: act
  constraint_failure: reframe
  execution_failure: act
  scope_failure: orient

failure_triggers:
  consecutive_discards: 3
  no_progress_cycles: 2
  same_failure_type: 2
  budget_exhausted: true
  soft_validation_only_after_all_cycles: mark_provisional

execution_policy:
  separate_facts_from_assumptions: true
  generate_multiple_options_before_commit: true
  prefer_reversible_actions: true
  mark_proxy_validation_explicitly: true
  preserve_rejected_options_briefly: true
  update_lessons_each_iteration: true
  inventory_capabilities_before_planning: true
  escalation_order:
    - reframe
    - gather_evidence
    - generate_new_options
    - escalate_blocker

parallel_policy:
  enabled: true
  max_concurrent_work_items: 3
  require_independence: true
  independence_check: reads must not intersect another item's writes, and writes must be pairwise disjoint
  per_item_checkpoint: true
  failure_isolation: true
  merge_before_next_stage: true

confidence_tracking:
  levels:
    - very_low
    - low
    - medium
    - high
    - very_high
  increase_on:
    - work_item_local_success
    - critical_uncertainty_eliminated
    - guard_passed_2_plus_consecutive
    - confirming_evidence_from_independent_source
  decrease_on:
    - guard_or_constraint_failure
    - result_not_reproducible
    - evidence_contradicts_assumption
    - same_failure_type_twice
  reset_to_low_on:
    - problem_reframed
    - dominant_hypothesis_changed
    - decision_owner_changed
  ceilings:
    soft_validation_only: medium
    fewer_than_2_evidence_sources: medium
    critical_unknown_unresolved: medium
    reframed_this_cycle: low

runtime_controls:
  require_checkpoint_before_stage_transition: true
  require_checkpoint_after_work_item: true
  require_checkpoint_before_irreversible_action: true
  max_no_progress_cycles: 2
  max_same_failure_cycles: 2
  max_cycles_without_external_signal: 4
  hard_stop_on_budget_exhaustion: true
  pause_on_missing_external_dependency: true
  require_external_checkpoint_for:
    - irreversible_actions
    - high_blast_radius_recommendations
    - soft_validation_only_decisions
  terminal_statuses:
    - solved
    - bounded_recommendation_ready
    - blocked_waiting_for_external_input
    - budget_exhausted
    - unsafe_to_continue

run_loop:
  repeat_until_terminal:
    - load_latest_checkpoint
    - if_terminal_condition_is_named_then_stop
    - if_hard_budget_is_exhausted_then_set_budget_exhausted_and_stop
    - rebuild_ready_queue_from_pending_work_items
    - if_resume_pointer_exists_then_try_that_work_item_first
    - if_ready_queue_is_empty_and_waiting_on_external_then_set_blocked_and_stop
    - select_next_work_item_by_priority
    - execute_one_attempt_only
    - decrement_iteration_budget_for_attempted_item
    - decrement_evidence_budget_for_each_new_source
    - if_new_external_signal_arrived_reset_external_signal_budget
    - if_external_signal_is_still_required_and_none_arrived_decrement_external_signal_budget
    - if_external_signal_budget_reaches_zero_then_set_blocked_and_stop
    - evaluate_progress_markers
    - update_confidence_counters_and_failure_state
    - checkpoint_state_and_evidence
    - route_to_next_stage_or_terminal_state
  selection_priority:
    - item_reduces_dominant_uncertainty
    - item_has_hard_validation_available
    - item_has_lowest_blast_radius
    - item_unblocks_other_items
    - oldest_pending_item
  resume_rules:
    - resume_pointer_takes_precedence_over_new_selection
    - do_not_rerun_completed_item_unless_invalidated
    - invalidate_on_new_contradictory_evidence_or_constraint_change

progress_markers:
  material_progress_requires_one_of:
    - new_independent_evidence_changes_hypothesis_status
    - new_external_signal_received
    - dominant_uncertainty_reduced_or_resolved
    - option_or_work_item_rejected_with_evidence_backed_reason
    - blocker_removed
    - hard_check_or_guard_newly_passes
    - confidence_ceiling_increases_from_new_independent_evidence
  does_not_count_as_progress:
    - restating_same_recommendation_without_new_evidence
    - rewording_same_argument_without_new_tradeoff_resolution
    - stage_change_without_new_information
  logging_rules:
    - progress_log MUST record one entry per cycle
    - progress_log markers MUST use only the allowed material progress vocabulary
    - an empty markers list means the cycle made no material progress
    - consecutive_no_progress MUST equal the number of trailing cycles with empty markers

checkpoint_policy:
  mode: full_snapshot
  required_contents:
    - active_work_item
    - pending_work_items
    - completed_work_items
    - rejected_options
    - evidence_log
    - evidence_sources
    - last_evaluated_hypotheses
    - decision_log
    - progress_log
    - terminal_condition
    - resume_pointer
  evidence_trail_requirements:
    - every checkpoint MUST preserve the full evidence_log, not only evidence ids
    - every evidence record MUST retain provenance or source linkage sufficient for replay
    - evidence_sources MUST remain available for every source referenced by the checkpoint

resume_pointer_schema:
  required_fields:
    - work_item_id
    - attempt_id
    - stage
    - checkpoint_namespace
    - next_step
  invariants:
    - work_item_id MUST refer to the active work item or a pending work item
    - checkpoint_namespace MUST equal the resumed work item's checkpoint_namespace
    - stage MUST equal current_stage unless the resume explicitly advances the state during checkpoint write

human_escalation:
  triggers:
    - domain_certified_judgment_required
    - blocker_persists_after_all_escalation_levels
    - irreversible_action_with_soft_validation_only
    - user_intent_ambiguous_and_affects_objective
    - constraint_violation_irreversible
    - options_tied_on_value_judgment
  message_template: |
    I am blocked on [specific thing].
    Reason: [why I cannot resolve this autonomously].
    What I need from you: [specific question or decision].
    Options if relevant: [A vs B, with trade-offs].
    What I will do after your input: [concrete next step].
  rules:
    - never escalate with vague requests
    - always provide context, options, and proposed path
    - include current confidence level

work_item_schema:
  required_fields:
    - id
    - kind
    - goal
    - scope
    - reads
    - writes
    - checkpoint_namespace
    - success_signal
    - validation
    - guardrails
    - progress_signals
    - stop_conditions
    - pause_conditions
    - handoff_conditions
    - evidence_budget
    - checkpoint
    - resume_instructions
    - iterations
    - failure_policy

state_schema:
  required_fields:
    - run_id
    - current_stage
    - capabilities
    - active_work_item
    - pending_work_items
    - completed_work_items
    - rejected_options
    - last_completed_action
    - last_checkpoint_at
    - last_external_signal_at
    - confidence
    - confidence_ceiling
    - evidence_log
    - evidence_sources
    - last_evaluated_hypotheses
    - decision_log
    - progress_log
    - blockers
    - waiting_on
    - waiting_on_external
    - budgets
    - counters
    - terminal_condition
    - resume_pointer
    - resume_instructions
  progress_log_schema:
    required_fields:
      - cycle
      - markers
    rules:
      - markers MAY be empty only when no material progress occurred in that cycle
      - evidence_ids are required whenever markers is non-empty

success_hierarchy:
  local_success:
    - recommendation_more_defensible
    - uncertainty_reduced_or_better_bounded
    - guardrails_remain_satisfied
  stage_success:
    - next_action_clearer
    - dominated_option_removed_with_reason
    - stakeholder_reality_better_modeled
  global_success:
    - problem_better_framed_than_initial_request
    - final_recommendation_supported_by_best_available_evidence
    - constraints_and_stakeholder_realities_acknowledged
    - next_action_is_concrete_and_justified

memory:
  lesson_levels:
    - case_specific
    - strategy_pattern
    - anti_pattern
  preferred_store:
    - lessons.md
    - cases.md
    - state.json
    - evidence_log.jsonl

final_report:
  sections:
    - capability_inventory
    - problem_framing
    - situation_model
    - prior_cases
    - candidate_options
    - recommendation
    - validation
    - confidence_and_ceiling
    - residual_uncertainty
    - checkpoint_status
    - terminal_condition
    - lessons
    - final_status
